<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
 <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#24594b"/></marker><style>.box{fill:#fff;stroke:#24594b;stroke-width:2}.dark{fill:#173e34}.vendor{fill:#f4efe5;stroke:#c5bda9;stroke-width:2}.t{font:600 22px Arial;fill:#16352e}.s{font:15px Arial;fill:#68736e}.w{fill:#fff}.line{stroke:#24594b;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:9 7}</style></defs>
 <rect width="1400" height="900" fill="#fbf9f3"/><text x="70" y="70" class="t" style="font-size:34px">Whosder Ghana Stays · Website Architecture &amp; Data Flow</text><text x="70" y="104" class="s">Secure short-term rental platform for owner-managed properties in Accra, Ghana</text>
 <rect x="70" y="180" width="250" height="150" rx="8" class="box"/><text x="105" y="225" class="t">Guest GUI</text><text x="105" y="260" class="s">Browse &amp; filter homes</text><text x="105" y="287" class="s">Select dates / guests</text><text x="105" y="314" class="s">Account &amp; bookings</text>
