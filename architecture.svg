 <path d="M865 520 C960 560 980 635 1080 645" class="line"/><text x="910" y="600" class="s">Scheduled media sync</text><path d="M1080 680 C965 725 930 570 865 550" class="line dash"/>
 <text x="70" y="820" class="s">Trust boundaries: guests never send raw card/mobile-money credentials to the app server. The payment vendor hosts fields and returns tokens.</text><text x="70" y="850" class="s">Airbnb media ingestion requires an authorized API, partner integration, or channel manager; avoid HTML scraping.</text>
