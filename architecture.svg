 <rect x="1080" y="150" width="250" height="135" rx="8" class="box"/><text x="1120" y="197" class="t">Database</text><text x="1120" y="232" class="s">Users · properties</text><text x="1120" y="259" class="s">Bookings · payment tokens</text>
 <rect x="1080" y="365" width="250" height="135" rx="8" class="vendor"/><text x="1120" y="412" class="t">Payment Vendor</text><text x="1120" y="447" class="s">Cards · MTN MoMo</text><text x="1120" y="474" class="s">Telecel · token vault</text>
 <rect x="1080" y="580" width="250" height="135" rx="8" class="vendor"/><text x="1120" y="627" class="t">Airbnb / PMS</text><text x="1120" y="662" class="s">Authorized API feed</text><text x="1120" y="689" class="s">Images · videos · listing IDs</text>
 <path d="M320 255 C400 255 410 350 515 350" class="line"/><text x="355" y="270" class="s">1. Search / reserve</text><path d="M320 625 C410 625 415 510 515 510" class="line"/><text x="356" y="610" class="s">CRUD + sync</text>
